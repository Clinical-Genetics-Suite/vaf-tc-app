name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping English app
        run: curl -s -o /dev/null -w "%{http_code}" https://vaf-tc-app.streamlit.app/

      - name: Ping Japanese app
        run: curl -s -o /dev/null -w "%{http_code}" https://vaf-tc-app-ja.streamlit.app/
